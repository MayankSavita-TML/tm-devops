name: OrderFlow-Lite CI/CD

on:
  workflow_dispatch:

env:
  IMAGE_NAME: orderflow-lite
  REGISTRY: localhost:5000

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: orderflow-lite/package-lock.json

      - name: Install Dependencies
        working-directory: orderflow-lite
        run: npm ci

      - name: Run Tests
        working-directory: orderflow-lite
        run: npm run test:ci

      - name: Upload JUnit Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: orderflow-lite/junit.xml

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Build Docker Image
        working-directory: orderflow-lite
        run: |
          docker build \
            -t ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} \
            -t ${REGISTRY}/${IMAGE_NAME}:latest \
            .

      - name: Push Docker Image
        run: |
          docker push ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${REGISTRY}/${IMAGE_NAME}:latest

      - name: Success Message
        if: success()
        run: |
          echo "Pushed ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG} (and :latest) - build #${GITHUB_RUN_NUMBER}"

      - name: Failure Message
        if: failure()
        run: |
          echo "OrderFlow-Lite build #${GITHUB_RUN_NUMBER} failed"
